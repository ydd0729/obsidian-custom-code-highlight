name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag $tag does not match manifest version $version"
            exit 1
          fi

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json

      - name: Generate styles artifact attestation
        if: hashFiles('styles.css') != ''
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Generate release notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          description="$(node -p "require('./manifest.json').description")"
          cat > release-notes.md <<EOF
          ${description}

          Changes in ${tag}:

          - Adds broader syntax highlighting for Obsidian code blocks in Reading view, Live Preview, and Source mode.
          - Bundles supported PrismJS and CodeMirror language highlighting into main.js.
          - Embeds Lean and MLIR fallback highlighting in main.js so Obsidian can install the plugin using only supported release assets.

          Release assets:

          - main.js
          - manifest.json
          EOF
          if [ -f styles.css ]; then
            echo "- styles.css" >> release-notes.md
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          assets="main.js manifest.json"
          if [ -f styles.css ]; then
            assets="$assets styles.css"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md \
            --verify-tag \
            $assets
